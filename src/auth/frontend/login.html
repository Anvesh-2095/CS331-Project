<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOAR Platform - Authentication</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --border-color: #30363d;
            --accent-color: #238636;
            --accent-hover: #2ea043;
            --error-color: #f85149;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 2rem;
            width: 100%;
            max-width: 340px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-area h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .logo-area p {
            color: var(--text-muted);
            margin-top: 5px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 8px 12px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #58a6ff;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: var(--accent-color);
            color: #ffffff;
            border: 1px solid rgba(240, 246, 252, 0.1);
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:disabled {
            background-color: var(--border-color);
            cursor: not-allowed;
        }

        #error-message {
            color: var(--error-color);
            font-size: 13px;
            text-align: center;
            margin-top: 15px;
            min-height: 18px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-area">
            <h1>SOAR Core</h1>
            <p>Unified Authentication Portal</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required autocomplete="email" placeholder="user@soar.local">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
            </div>

            <button type="submit" id="submit-btn">Sign In</button>
        </form>

        <div id="error-message"></div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault(); // Prevent the default HTML form submission

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const submitBtn = document.getElementById('submit-btn');

            // Reset UI state
            errorDiv.textContent = '';
            submitBtn.textContent = 'Authenticating...';
            submitBtn.disabled = true;

            try {
                // 1. Send credentials to your FastAPI backend
                const response = await fetch('http://127.0.0.1:8001/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: email, password: password })
                });

                if (response.ok) {
                    const data = await response.json();

                    // 2. Save tokens securely in browser memory
                    localStorage.setItem('soar_access_token', data.access_token);
                    localStorage.setItem('soar_refresh_token', data.refresh_token);
                    localStorage.setItem('soar_user_role', data.role);

                    // 3. RBAC Redirection Logic
                    if (data.role === 'admin') {
                        // Redirect to the Admin Playbook Builder
                        window.location.href = 'admin_dashboard.html'; 
                    } else if (data.role === 'analyst') {
                        // Redirect to the Analyst Dashboard
                        window.location.href = 'analyst_dashboard.html';
                    } else {
                        errorDiv.textContent = 'Error: Unknown user role assigned.';
                        submitBtn.textContent = 'Sign In';
                        submitBtn.disabled = false;
                    }

                } else {
                    // Handle 401 Unauthorized or 403 Forbidden
                    const errorData = await response.json();
                    errorDiv.textContent = errorData.detail || 'Invalid email or password.';
                    submitBtn.textContent = 'Sign In';
                    submitBtn.disabled = false;
                }

            } catch (error) {
                // Handle network errors (e.g., FastAPI server is down)
                errorDiv.textContent = 'Connection refused. Is the backend running?';
                submitBtn.textContent = 'Sign In';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
